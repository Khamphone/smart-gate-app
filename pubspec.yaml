name: smart_gate_app
description: Smart Gate barrier management and toll collection app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # State management
  flutter_bloc: ^8.1.5
  equatable: ^2.0.5
  # DI
  get_it: ^7.7.0
  # Navigation
  go_router: ^13.2.0
  # Network
  dio: ^5.4.3
  # Local storage
  shared_preferences: ^2.2.3
  # Utils
  intl: ^0.19.0
  # Firebase / Push Notifications
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  mocktail: ^1.0.3

flutter:
  uses-material-design: true
